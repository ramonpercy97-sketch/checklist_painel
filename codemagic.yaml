workflows:
  ios-release:
    name: iOS Release

    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Flutter version
        script: flutter --version

      - name: Clean project
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Verify iOS structure
        script: |
          ls -la ios
          ls -la ios/Runner.xcodeproj
          ls -la ios/Runner.xcodeproj/xcshareddata/xcschemes

      - name: Build IPA
        script: flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive